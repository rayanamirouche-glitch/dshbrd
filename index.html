<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Avis — R.Consulting</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f5f0;--white:#fff;--border:#e8e8e2;--text:#1a1a1a;--muted:#888880;--accent:#e8451e;--gold:#f5a623;--green:#16a34a;--red:#dc2626;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:"Outfit",sans-serif;min-height:100vh;padding-bottom:40px;}
.header{background:var(--white);border-bottom:1px solid var(--border);padding:16px 20px;position:sticky;top:0;z-index:100;}
.hi{max-width:960px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.logo{background:var(--accent);color:white;font-size:11px;font-weight:700;letter-spacing:0.08em;padding:4px 10px;border-radius:20px;text-transform:uppercase;}
.htitle{font-size:16px;font-weight:600;}
.btn{background:var(--accent);color:white;border:none;border-radius:10px;padding:9px 18px;font-size:13px;font-weight:600;cursor:pointer;font-family:"Outfit",sans-serif;}
.btn:disabled{opacity:0.45;cursor:not-allowed;}
.setup{max-width:960px;margin:28px auto;padding:0 16px;}
.sc{background:var(--white);border-radius:14px;border:1px solid var(--border);padding:24px;}
.st{font-size:16px;font-weight:600;margin-bottom:6px;}
.ss{font-size:13px;color:var(--muted);margin-bottom:18px;line-height:1.65;}
.ir{display:flex;gap:8px;}
.ai{flex:1;border:1.5px solid var(--border);border-radius:10px;padding:11px 14px;font-size:14px;font-family:"Outfit",sans-serif;outline:none;}
.ai:focus{border-color:var(--accent);}
.bg{background:var(--accent);color:white;border:none;border-radius:10px;padding:11px 22px;font-size:14px;font-weight:600;cursor:pointer;font-family:"Outfit",sans-serif;}
.sg{max-width:960px;margin:20px auto;padding:0 16px;display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.scard{background:var(--white);border-radius:12px;border:1px solid var(--border);padding:16px;text-align:center;}
.sl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px;}
.sv{font-size:28px;font-weight:700;}
.svg{color:var(--green);}.svo{color:var(--gold);}
.fw{max-width:960px;margin:0 auto 14px;padding:0 16px;display:flex;gap:6px;flex-wrap:wrap;}
.fb{font-size:12px;font-weight:500;padding:5px 13px;border-radius:20px;border:1.5px solid var(--border);background:var(--white);color:var(--muted);cursor:pointer;font-family:"Outfit",sans-serif;}
.fb.active{background:var(--accent);color:white;border-color:var(--accent);}
.pw{max-width:960px;margin:0 auto 14px;padding:0 16px;display:none;}
.pb{background:var(--border);border-radius:99px;height:5px;overflow:hidden;}
.pbi{height:100%;background:var(--accent);border-radius:99px;transition:width .4s;width:0%;}
.pt{font-size:12px;color:var(--muted);margin-top:6px;text-align:center;}
.main{max-width:960px;margin:0 auto;padding:0 16px;}
.tw{background:var(--white);border-radius:14px;border:1px solid var(--border);overflow:hidden;}
table{width:100%;border-collapse:collapse;}
thead th{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;padding:12px 16px;background:var(--bg);border-bottom:1px solid var(--border);text-align:left;cursor:pointer;}
thead th:hover{color:var(--text);}
tbody tr{border-bottom:1px solid var(--border);}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:#fafaf8;}
td{padding:11px 16px;font-size:14px;vertical-align:middle;}
.chip{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:0.04em;}
.c-aaron{background:#dbeafe;color:#1d4ed8;}.c-lionel{background:#dcfce7;color:#15803d;}
.c-jeremy{background:#ffedd5;color:#c2410c;}.c-sacha{background:#fce7f3;color:#be185d;}
.c-annecy{background:#ede9fe;color:#6d28d9;}.c-dprenov{background:#e0f2fe;color:#0369a1;}
.c-kenny{background:#fef3c7;color:#92400e;}.c-brule{background:#fee2e2;color:#991b1b;}
.c-brad{background:#f0fdf4;color:#166534;}.c-ludo{background:#fefce8;color:#854d0e;}
.an{font-size:18px;font-weight:700;}
.nw{display:flex;align-items:center;gap:5px;}
.star{color:var(--gold);font-size:12px;}
.sok{color:var(--green);font-size:12px;}.slo{color:var(--muted);font-size:12px;}.ser{color:var(--red);font-size:11px;}
.fn{padding:10px 16px;text-align:center;font-size:11px;color:var(--muted);}
@media(max-width:640px){.sg{grid-template-columns:1fr 1fr;}thead th:last-child,td:last-child{display:none;}}
</style>
</head>
<body>
<div class="header"><div class="hi">
  <div style="display:flex;align-items:center;gap:10px;">
    <span class="logo">R.Consulting</span>
    <span class="htitle">Dashboard Avis Google</span>
  </div>
  <button class="btn" id="btnR" onclick="loadAll()" disabled>↻ Actualiser</button>
</div></div>

<div class="setup" id="su">
  <div class="sc">
    <div class="st">🔑 Clé API Google Places</div>
    <div class="ss">Entre ta clé API une fois — mémorisée dans ton navigateur.<br>
    <strong style="color:var(--accent)">Ce dashboard doit être hébergé en https:// pour fonctionner.</strong></div>
    <div class="ir">
      <input class="ai" id="ai" type="password" placeholder="AIzaSy..." onkeydown="if(event.key==='Enter')sk()">
      <button class="bg" onclick="sk()">Valider →</button>
    </div>
    <div id="err" style="margin-top:10px;font-size:13px;color:var(--red);display:none;"></div>
  </div>
</div>

<div class="sg" id="sw" style="display:none;">
  <div class="scard"><div class="sl">Total avis</div><div class="sv svg" id="st1">—</div></div>
  <div class="scard"><div class="sl">Note moyenne</div><div class="sv svo" id="st2">—</div></div>
  <div class="scard"><div class="sl">Fiches OK</div><div class="sv" id="st3">0/37</div></div>
  <div class="scard"><div class="sl">Clients</div><div class="sv">9</div></div>
</div>

<div class="fw" id="fw" style="display:none;">
  <button class="fb active" onclick="sf('all',this)">Tous</button>
  <button class="fb" onclick="sf('Aaron',this)">Aaron</button>
  <button class="fb" onclick="sf('Lionel',this)">Lionel</button>
  <button class="fb" onclick="sf('Jérémy',this)">Jérémy</button>
  <button class="fb" onclick="sf('Sacha',this)">Sacha</button>
  <button class="fb" onclick="sf('CF Annecy',this)">CF Annecy</button>
  <button class="fb" onclick="sf('Brulé',this)">Brulé</button>
  <button class="fb" onclick="sf('Brad',this)">Brad</button>
  <button class="fb" onclick="sf('DP Renov',this)">DP Renov</button>
  <button class="fb" onclick="sf('Kenny',this)">Kenny</button>
  <button class="fb" onclick="sf('Ludo',this)">Ludo</button>
</div>

<div class="pw" id="pw"><div class="pb"><div class="pbi" id="pb"></div></div><div class="pt" id="pt">Chargement...</div></div>

<div class="main">
  <div class="tw" id="tw" style="display:none;">
    <table>
      <thead><tr>
        <th>Client</th><th>Fiche</th>
        <th onclick="so('avis')">Avis ↕</th>
        <th onclick="so('note')">Note ↕</th>
        <th>Statut</th>
      </tr></thead>
      <tbody id="tb"></tbody>
    </table>
    <div class="fn" id="fn"></div>
  </div>
</div>

<script>
const FICHES=[
  {client:"Aaron",nom:"Oyonnax Couvreur Pro",cid:"6292677747058233193"},
  {client:"Aaron",nom:"Elite Pro Couvreur",cid:"11208441055833710186"},
  {client:"Aaron",nom:"Expert Couvreur Bourg en Bresse",cid:"14950481522386390916"},
  {client:"Aaron",nom:"Couvreur Porto Vecchio",cid:"12082652670312810431"},
  {client:"Aaron",nom:"Couvreur Ajaccio Solid Toiture",cid:"9727286473904905172"},
  {client:"Aaron",nom:"Bastia Expert Couvreur",cid:"3358639538069451540"},
  {client:"Lionel",nom:"Beaulieu Toit Père Fils",cid:"8090180097465409641"},
  {client:"Lionel",nom:"CE Toiture Cagnes sur Mer",cid:"8147690468756070872"},
  {client:"Lionel",nom:"Génie Toit Villefranche",cid:"5282051417679589024"},
  {client:"Jérémy",nom:"L&B Toit Cannes",cid:"13410732468470858731"},
  {client:"Jérémy",nom:"Toit L&B Roquefort les Pins",cid:"6194017043778641355"},
  {client:"Jérémy",nom:"Mougins Brad Toiture",cid:"6701325548605677703"},
  {client:"Jérémy",nom:"Pro Roquefort les Pins",cid:"489748909041564619"},
  {client:"Jérémy",nom:"La Colle sur Loup Toit Sacha",cid:"5745391457805431426"},
  {client:"Jérémy",nom:"Solid Antibes Couverture",cid:"13979841631978713189"},
  {client:"Jérémy",nom:"Renov Toiture Tourrette sur Loup",cid:"7621549192714016841"},
  {client:"Jérémy",nom:"Original Villefranche Toiture",cid:"10316178773924233638"},
  {client:"Jérémy",nom:"LB Toit Vence",cid:"12526887163848764060"},
  {client:"Jérémy",nom:"Pro Elag Elite",cid:"9886261050457999912"},
  {client:"Sacha",nom:"Solid Pro Dakwerken Overijse",cid:"17187630048606752092"},
  {client:"Sacha",nom:"Audreghem Pro Toiture",cid:"3611863616939327378"},
  {client:"Sacha",nom:"Woluwe Dakwerken Elite",cid:"16885356572446167831"},
  {client:"Sacha",nom:"Couvreur Rixensart",cid:"4714914721068122862"},
  {client:"Sacha",nom:"Tervuren Couverture Pro",cid:"6657937963402058806"},
  {client:"Sacha",nom:"Couvreur Pro Elite Uccle",cid:"39517506315121168"},
  {client:"Sacha",nom:"ProCouverture La Hulpe",cid:"1991362756160795734"},
  {client:"Sacha",nom:"ProCouvreur Waterloo",cid:"14616330890469889463"},
  {client:"CF Annecy",nom:"CDF Couverture",cid:"1327660439490264154"},
  {client:"DP Renov",nom:"DP Rénove Toiture",cid:"5560237652588254629"},
  {client:"Kenny",nom:"Expert Toiture",cid:"6971534091335161362"},
  {client:"Brulé",nom:"Best Couverture AB Clermont",cid:"5989023954483523083"},
  {client:"Brulé",nom:"Brule Renovation Couvreur",cid:"6656675988037543440"},
  {client:"Brulé",nom:"AB Couverture",cid:"4148108377987474301"},
  {client:"Brad",nom:"BR Toiture Rénovation StE",cid:"15999645025189498092"},
  {client:"Brad",nom:"Répare Rénove Toiture",cid:"16430458226112446617"},
  {client:"Brad",nom:"St Etienne Expert Elite",cid:"16845423638134483978"},
  {client:"Ludo",nom:"Renov Habitat Couvreur",cid:"7299770803682289547"},
];
const CH={Aaron:"c-aaron",Lionel:"c-lionel","Jérémy":"c-jeremy",Sacha:"c-sacha","CF Annecy":"c-annecy","DP Renov":"c-dprenov",Kenny:"c-kenny","Brulé":"c-brule",Brad:"c-brad",Ludo:"c-ludo"};
let K=localStorage.getItem("rc_k")||"",D=FICHES.map(f=>({...f,avis:null,note:null,s:"p"})),F="all",SO=null,SD=-1;

function sk(){
  const v=document.getElementById("ai").value.trim();
  if(!v)return;
  K=v;localStorage.setItem("rc_k",v);
  document.getElementById("su").style.display="none";
  document.getElementById("btnR").disabled=false;
  loadAll();
}

async function fp(f){
  const url=`https://maps.googleapis.com/maps/api/place/details/json?cid=${f.cid}&fields=name,rating,user_ratings_total&key=${K}`;
  try{
    const r=await fetch(url);
    if(!r.ok)return{...f,avis:0,note:0,s:"e",e:`HTTP ${r.status}`};
    const d=await r.json();
    if(d.status==="OK"&&d.result)return{...f,avis:d.result.user_ratings_total||0,note:d.result.rating||0,s:"ok"};
    if(d.status==="REQUEST_DENIED"){
      document.getElementById("err").style.display="block";
      document.getElementById("err").textContent="Clé API invalide ou Places API non activée. Vérifie ta clé dans Google Cloud Console.";
    }
    return{...f,avis:0,note:0,s:"e",e:d.status||"No data"};
  }catch(e){return{...f,avis:0,note:0,s:"e",e:e.message};}
}

async function loadAll(){
  const btn=document.getElementById("btnR");
  btn.disabled=true;btn.textContent="⏳";
  document.getElementById("sw").style.display="grid";
  document.getElementById("fw").style.display="flex";
  document.getElementById("pw").style.display="block";
  document.getElementById("tw").style.display="block";
  D=FICHES.map(f=>({...f,avis:null,note:null,s:"l"}));
  ren();let done=0;
  for(let i=0;i<FICHES.length;i+=5){
    const b=FICHES.slice(i,Math.min(i+5,FICHES.length));
    const res=await Promise.all(b.map(f=>fp(f)));
    res.forEach((r,j)=>{D[i+j]=r;done++;});
    document.getElementById("pb").style.width=`${Math.round(done/FICHES.length*100)}%`;
    document.getElementById("pt").textContent=`${done} / ${FICHES.length} fiches`;
    ren();us();
    if(i+5<FICHES.length)await new Promise(r=>setTimeout(r,150));
  }
  document.getElementById("pw").style.display="none";
  document.getElementById("fn").textContent=`Mise à jour : ${new Date().toLocaleString("fr-FR")}`;
  btn.disabled=false;btn.innerHTML="↻ Actualiser";us();
}

function ren(){
  let rows=F==="all"?[...D]:D.filter(f=>f.client===F);
  if(SO)rows.sort((a,b)=>((a[SO]??-1)-(b[SO]??-1))*SD);
  document.getElementById("tb").innerHTML=rows.map(f=>{
    const ch=CH[f.client]||"c-aaron";
    const st=f.note?"★".repeat(Math.round(f.note))+"☆".repeat(5-Math.round(f.note)):"";
    const ac=f.s==="l"?"<span style=\"color:var(--muted)\">…</span>":f.s==="e"?"—":`<span class=\"an\">${f.avis}</span>`;
    const nc=f.s==="ok"?`<div class=\"nw\"><span class=\"star\">${st}</span><span style=\"font-size:13px;font-weight:600\">${f.note.toFixed(1)}</span></div>`:"—";
    const sc=f.s==="l"?"<span class=\"slo\">⏳</span>":f.s==="ok"?"<span class=\"sok\">✓ OK</span>":`<span class=\"ser\">✗ ${f.e||"err"}</span>`;
    return`<tr><td><span class=\"chip ${ch}\">${f.client}</span></td><td style=\"font-weight:500\">${f.nom}</td><td>${ac}</td><td>${nc}</td><td>${sc}</td></tr>`;
  }).join("");
}

function us(){
  const ok=D.filter(f=>f.s==="ok");
  document.getElementById("st1").textContent=ok.reduce((s,f)=>s+f.avis,0)||"—";
  document.getElementById("st2").textContent=ok.length?(ok.reduce((s,f)=>s+f.note,0)/ok.length).toFixed(1):"—";
  document.getElementById("st3").textContent=`${ok.length}/${FICHES.length}`;
}

function sf(f,btn){F=f;document.querySelectorAll(".fb").forEach(b=>b.classList.remove("active"));btn.classList.add("active");ren();}
function so(f){if(SO===f)SD*=-1;else{SO=f;SD=-1;}ren();}

if(K){document.getElementById("su").style.display="none";document.getElementById("btnR").disabled=false;window.addEventListener("load",loadAll);}
</script>
</body>
</html>
