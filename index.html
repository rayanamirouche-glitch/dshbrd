<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>R.Consulting — Dashboard GBP</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f6f5f2;
  --white:#ffffff;
  --surface:#fafaf8;
  --border:#e8e5df;
  --text:#1a1916;
  --muted:#9b9489;
  --accent:#2d6a4f;
  --radius:14px;
  --radius-sm:8px;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 16px rgba(0,0,0,.08),0 1px 4px rgba(0,0,0,.04);
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;min-height:100vh}

header{background:var(--white);border-bottom:1px solid var(--border);padding:0 28px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.brand{display:flex;align-items:center;gap:10px}
.brand-dot{width:28px;height:28px;background:var(--text);border-radius:8px;display:flex;align-items:center;justify-content:center}
.brand-dot span{color:var(--white);font-size:11px;font-weight:600;font-family:'DM Mono',monospace;letter-spacing:.5px}
.brand-name{font-size:15px;font-weight:600;letter-spacing:-.3px}
.brand-tag{font-size:12px;color:var(--muted);font-family:'DM Mono',monospace}
.header-right{display:flex;align-items:center;gap:10px}
#api-input{background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:'DM Mono',monospace;font-size:12px;padding:9px 14px;border-radius:var(--radius-sm);width:280px;outline:none;transition:border-color .15s}
#api-input::placeholder{color:var(--muted)}
#api-input:focus{border-color:var(--text)}
#api-btn{background:var(--text);color:var(--white);border:none;padding:9px 18px;font-family:'DM Sans',sans-serif;font-weight:500;font-size:13px;border-radius:var(--radius-sm);cursor:pointer;transition:opacity .15s}
#api-btn:hover{opacity:.85}
.refresh-btn{background:transparent;border:1px solid var(--border);color:var(--muted);padding:9px 14px;border-radius:var(--radius-sm);font-size:13px;cursor:pointer;transition:all .15s}
.refresh-btn:hover{border-color:var(--text);color:var(--text)}

.stats-row{display:flex;gap:12px;padding:20px 28px;flex-wrap:wrap}
.stat-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;min-width:120px;box-shadow:var(--shadow)}
.stat-label{font-size:11px;color:var(--muted);font-weight:500;letter-spacing:.3px;text-transform:uppercase;margin-bottom:4px}
.stat-val{font-size:26px;font-weight:300;letter-spacing:-1px;color:var(--text)}
.stat-val.green{color:#16a34a}
.stat-val.red{color:#dc2626}
.stat-val.amber{color:#d97706}

#progress-bar-wrap{height:3px;background:var(--border);margin:0 28px;border-radius:3px;overflow:hidden;display:none}
#progress-bar-wrap.active{display:block}
#progress-fill{height:100%;background:var(--text);border-radius:3px;width:0%;transition:width .3s ease}

main{padding:20px 28px 48px}
.section{margin-bottom:36px}
.section-header{display:flex;align-items:baseline;gap:10px;margin-bottom:14px}
.section-name{font-size:17px;font-weight:600;letter-spacing:-.3px}
.section-count{font-size:12px;color:var(--muted);font-family:'DM Mono',monospace}
.section-zone{font-size:12px;color:var(--muted);margin-left:auto;font-style:italic}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}

.card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);transition:box-shadow .2s,transform .2s}
.card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
.card-img{width:100%;height:130px;object-fit:cover;background:var(--surface);display:block}
.card-img-empty{width:100%;height:130px;background:linear-gradient(135deg,var(--surface) 0%,var(--border) 100%);display:flex;align-items:center;justify-content:center}
.card-img-empty span{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;letter-spacing:.5px}
.card-body{padding:14px 16px 16px}
.card-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px;line-height:1.35}
.card-address{font-size:11px;color:var(--muted);margin-bottom:10px;line-height:1.5;font-family:'DM Mono',monospace}
.card-footer{display:flex;align-items:center;justify-content:space-between;gap:8px}
.rating-block{display:flex;align-items:center;gap:6px}
.star-filled{color:#f59e0b}
.star-empty{color:#e5e0d8}
.rating-num{font-size:15px;font-weight:600;letter-spacing:-.5px}
.rating-count{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace}
.badge{font-size:10px;font-weight:500;padding:4px 9px;border-radius:20px;font-family:'DM Mono',monospace;letter-spacing:.3px;white-space:nowrap}
.badge.op{background:#f0fdf4;color:#15803d}
.badge.warn{background:#fffbeb;color:#d97706}
.badge.err{background:#fef2f2;color:#dc2626}
.badge.unknown{background:var(--surface);color:var(--muted);border:1px solid var(--border)}
.maps-link{display:inline-flex;align-items:center;gap:4px;margin-top:10px;font-size:11px;color:#2563eb;text-decoration:none;font-weight:500;transition:opacity .15s}
.maps-link:hover{opacity:.7}
.maps-link svg{width:11px;height:11px;flex-shrink:0}
.card-loading{height:80px;display:flex;align-items:center;justify-content:center;gap:8px;color:var(--muted);font-size:12px;font-family:'DM Mono',monospace}
.spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--text);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.card-err-body{padding:14px 16px;font-size:11px;color:#dc2626;font-family:'DM Mono',monospace}
.empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-state p{font-size:14px;line-height:1.6}
.empty-state .big{font-size:36px;margin-bottom:12px}
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-dot"><span>RC</span></div>
    <div>
      <div class="brand-name">R.Consulting</div>
      <div class="brand-tag">GBP Dashboard</div>
    </div>
  </div>
  <div class="header-right">
    <input id="api-input" type="password" placeholder="Clé API Google Places…" autocomplete="off"/>
    <button id="api-btn" onclick="initDashboard()">Valider</button>
    <button class="refresh-btn" onclick="refreshAll()">↺</button>
  </div>
</header>

<div class="stats-row">
  <div class="stat-card"><div class="stat-label">Fiches</div><div class="stat-val" id="s-total">—</div></div>
  <div class="stat-card"><div class="stat-label">Actives</div><div class="stat-val green" id="s-ok">—</div></div>
  <div class="stat-card"><div class="stat-label">Problèmes</div><div class="stat-val red" id="s-err">—</div></div>
  <div class="stat-card"><div class="stat-label">Note moy.</div><div class="stat-val amber" id="s-rating">—</div></div>
  <div class="stat-card"><div class="stat-label">Avis totaux</div><div class="stat-val" id="s-reviews">—</div></div>
</div>

<div id="progress-bar-wrap"><div id="progress-fill"></div></div>

<main id="main">
  <div class="empty-state">
    <div class="big">🔑</div>
    <p>Entre ta clé API Google Places<br>et clique <strong>Valider</strong> pour charger les fiches.</p>
  </div>
</main>

let apiKey=localStorage.getItem('rc_key')||'';
let results={};

function statusBadge(s){
  if(s==='OPERATIONAL') return '<span class="badge op">Actif</span>';
  if(s==='CLOSED_TEMPORARILY') return '<span class="badge warn">Fermé temp.</span>';
  if(s==='CLOSED_PERMANENTLY') return '<span class="badge err">Fermé déf.</span>';
  if(s==='SUSPENDED') return '<span class="badge err">Suspendu</span>';
  return '<span class="badge unknown">Inconnu</span>';
}

function renderStars(r){
  if(!r) return '<span style="font-size:11px;color:var(--muted);font-family:\'DM Mono\',monospace">—</span>';
  let s='';
  for(let i=1;i<=5;i++) s+=`<span class="${i<=Math.round(r)?'star-filled':'star-empty'}">★</span>`;
  return s;
}

function initDashboard(){
  const v=document.getElementById('api-input').value.trim();
  if(v){apiKey=v;localStorage.setItem('rc_key',v);}
  if(!apiKey){alert('Entre ta clé API !');return;}
  results={};
  buildSkeleton();
  loadAll();
}

function refreshAll(){
  if(!apiKey){alert('Entre ta clé API d\'abord.');return;}
  results={};
  buildSkeleton();
  loadAll();
}

function buildSkeleton(){
  const m=document.getElementById('main');
  m.innerHTML='';
  const total=CLIENTS.reduce((s,c)=>s+c.fiches.length,0);
  document.getElementById('s-total').textContent=total;
  ['s-ok','s-err','s-rating','s-reviews'].forEach(id=>document.getElementById(id).textContent='—');
  CLIENTS.forEach(c=>{
    const sec=document.createElement('div');
    sec.className='section';
    sec.innerHTML=`
      <div class="section-header">
        <span class="section-name">${c.name}</span>
        <span class="section-count">${c.fiches.length} fiche${c.fiches.length>1?'s':''}</span>
        <span class="section-zone">${c.zone}</span>
      </div>
      <div class="grid" id="grid-${c.name}">
        ${c.fiches.map(f=>`<div class="card" id="card-${f.id.replace(/[^a-z0-9]/gi,'_')}"><div class="card-loading"><div class="spinner"></div>Chargement…</div></div>`).join('')}
      </div>
    `;
    m.appendChild(sec);
  });
}

function cardId(id){return'card-'+id.replace(/[^a-z0-9]/gi,'_');}

async function loadAll(){
  const bar=document.getElementById('progress-bar-wrap');
  const fill=document.getElementById('progress-fill');
  bar.classList.add('active');
  fill.style.width='0%';
  const all=CLIENTS.flatMap(c=>c.fiches);
  let done=0,qi=0;
  async function worker(){
    while(qi<all.length){
      const f=all[qi++];
      try{
        const data=await fetchFiche(f.id);
        results[f.id]={...data,mapUrl:f.url};
        renderCard(f.id,data,f.url,f.n);
      }catch(e){
        renderCardErr(f.id,f.n,e.message,f.url);
      }
      done++;
      fill.style.width=Math.round(done/all.length*100)+'%';
    }
  }
  await Promise.all([worker(),worker(),worker()]);
  setTimeout(()=>{bar.classList.remove('active');fill.style.width='0%';},600);
  updateStats();
}

async function fetchFiche(place_id){
  const r=await fetch(`/.netlify/functions/places?place_id=${encodeURIComponent(place_id)}`);
  if(!r.ok) throw new Error('HTTP '+r.status);
  const d=await r.json();
  if(d.error) throw new Error(d.error);
  return d;
}

function renderCard(id,d,url,fallback){
  const card=document.getElementById(cardId(id));
  if(!card) return;
  card.innerHTML=`
    ${d.photo_url
      ?`<img class="card-img" src="${d.photo_url}" alt="" onerror="this.outerHTML='<div class=card-img-empty><span>No photo</span></div>'">`
      :`<div class="card-img-empty"><span>No photo</span></div>`
    }
    <div class="card-body">
      <div class="card-name">${d.name||fallback}</div>
      ${d.address?`<div class="card-address">${d.address.split(',').slice(0,2).join(',')}</div>`:''}
      <div class="card-footer">
        <div class="rating-block">
          <div>${renderStars(d.rating)}</div>
          ${d.rating?`<span class="rating-num">${d.rating.toFixed(1)}</span>`:''}
          <span class="rating-count">${d.reviews?`(${d.reviews})`:'—'}</span>
        </div>
        ${statusBadge(d.status)}
      </div>
      <a class="maps-link" href="${d.maps_url||url}" target="_blank">
        <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M7 1h4v4M11 1L6.5 5.5M5 2H2a1 1 0 00-1 1v7a1 1 0 001 1h7a1 1 0 001-1V8"/></svg>
        Voir sur Maps
      </a>
    </div>
  `;
}

function renderCardErr(id,name,msg,url){
  const card=document.getElementById(cardId(id));
  if(!card) return;
  card.innerHTML=`
    <div class="card-img-empty"><span>Erreur</span></div>
    <div class="card-body">
      <div class="card-name">${name}</div>
      <div class="card-err-body">⚠ ${msg}</div>
      <a class="maps-link" href="${url}" target="_blank">
        <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M7 1h4v4M11 1L6.5 5.5M5 2H2a1 1 0 00-1 1v7a1 1 0 001 1h7a1 1 0 001-1V8"/></svg>
        Voir sur Maps
      </a>
    </div>
  `;
}

function updateStats(){
  const vals=Object.values(results);
  const ok=vals.filter(r=>r.status==='OPERATIONAL').length;
  const err=vals.filter(r=>r.status&&r.status!=='OPERATIONAL').length;
  const rated=vals.filter(r=>r.rating);
  const avg=rated.length?(rated.reduce((s,r)=>s+r.rating,0)/rated.length).toFixed(1):'—';
  const rev=vals.reduce((s,r)=>s+(r.reviews||0),0);
  document.getElementById('s-ok').textContent=ok||'—';
  document.getElementById('s-err').textContent=err||'—';
  document.getElementById('s-rating').textContent=avg;
  document.getElementById('s-reviews').textContent=rev||'—';
}

window.addEventListener('DOMContentLoaded',()=>{
  if(apiKey){document.getElementById('api-input').value=apiKey;initDashboard();}
});
</script>
</body>
</html>
